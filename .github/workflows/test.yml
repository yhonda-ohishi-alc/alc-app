name: Test

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/test.yml']
  pull_request:
    branches: [main]
    paths: ['web/**', '.github/workflows/test.yml']

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Vitest + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # fc1200-wasm is a local file: dependency — stub it for CI
      - name: Stub fc1200-wasm
        run: |
          mkdir -p ../fc1200-wasm/pkg
          echo '{"name":"fc1200-wasm","version":"0.0.0","main":"index.js"}' > ../fc1200-wasm/pkg/package.json
          echo 'module.exports = {}' > ../fc1200-wasm/pkg/index.js

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json

      - name: Coverage 100% regression check
        run: node scripts/check_coverage_100.mjs

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # テスト結果サマリ (vitest json reporter)
          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # カバレッジサマリ (coverage-summary.json)
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Stmts | Branch | Funcs | Lines |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|--------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./coverage/coverage-summary.json');
              const t = s.total;
              console.log('| **Total** | ' + t.statements.pct + '% | ' + t.branches.pct + '% | ' + t.functions.pct + '% | ' + t.lines.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY

            # 100% ファイル数
            node -e "
              const s = require('./coverage/coverage-summary.json');
              const files = Object.keys(s).filter(k => k !== 'total');
              const full = files.filter(k => s[k].lines.pct === 100);
              console.log('**Lines 100%:** ' + full.length + ' / ' + files.length + ' files');
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY

            # Lines 100% 未達ファイル一覧
            echo "<details><summary>Lines &lt; 100% ファイル一覧</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Stmts | Branch | Funcs | Lines |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|--------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const path = require('path');
              const s = require('./coverage/coverage-summary.json');
              const cwd = process.cwd();
              Object.keys(s).filter(k => k !== 'total').forEach(k => {
                const e = s[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  console.log('| ' + rel + ' | ' + e.statements.pct + '% | ' + e.branches.pct + '% | ' + e.functions.pct + '% | ' + e.lines.pct + '% |');
                }
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: web/coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # fc1200-wasm is a local file: dependency — stub it for CI
      - name: Stub fc1200-wasm
        run: |
          mkdir -p ../fc1200-wasm/pkg
          echo '{"name":"fc1200-wasm","version":"0.0.0","main":"index.js","types":"index.d.ts"}' > ../fc1200-wasm/pkg/package.json
          echo 'module.exports = {}' > ../fc1200-wasm/pkg/index.js
          cp app/types/fc1200-wasm.d.ts ../fc1200-wasm/pkg/index.d.ts

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx nuxi typecheck

  integration-test:
    name: API Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # fc1200-wasm is a local file: dependency — stub it for CI
      - name: Stub fc1200-wasm
        run: |
          mkdir -p ../fc1200-wasm/pkg
          echo '{"name":"fc1200-wasm","version":"0.0.0","main":"index.js"}' > ../fc1200-wasm/pkg/package.json
          echo 'module.exports = {}' > ../fc1200-wasm/pkg/index.js

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start API + DB containers
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: npx vitest run tests/utils/api.test.ts
        env:
          TEST_LIVE: '1'
          API_BASE_URL: http://localhost:18080

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'pull_request'
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Stub fc1200-wasm
        run: |
          mkdir -p ../fc1200-wasm/pkg
          echo '{"name":"fc1200-wasm","version":"0.0.0","main":"index.js"}' > ../fc1200-wasm/pkg/package.json
          echo 'module.exports = {}' > ../fc1200-wasm/pkg/index.js

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --env staging

  deploy-release:
    name: Deploy Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Stub fc1200-wasm
        run: |
          mkdir -p ../fc1200-wasm/pkg
          echo '{"name":"fc1200-wasm","version":"0.0.0","main":"index.js"}' > ../fc1200-wasm/pkg/package.json
          echo 'module.exports = {}' > ../fc1200-wasm/pkg/index.js

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers (release)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

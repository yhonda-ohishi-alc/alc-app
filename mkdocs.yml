site_name: ALC アプリ 操作マニュアル
site_url: https://yhonda-ohishi-alc.github.io/alc-app/
site_description: アルコールチェッカーシステム 操作マニュアル
repo_url: https://github.com/yhonda-ohishi-alc/alc-app
repo_name: yhonda-ohishi-alc/alc-app

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  font:
    text: Noto Sans JP
    code: Roboto Mono

plugins:
  - search:
      lang: ja
  - print-site:
      add_cover_page: true
      cover_page_template: ""
      add_table_of_contents: true
      toc_title: "目次"
      toc_depth: 3
      add_full_urls: false
      enumerate_headings: false
      enumerate_figures: false
      print_page_title: "印刷用ページ"
      path_to_pdf: ""

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - ホーム: index.md
  - 運行者向け: operator/index.md
  - 運行管理者: admin/index.md
  - システム管理者: admin/sysadmin.md
  - 遠隔点呼: admin/remote-tenko.md
  - ダウンロード: downloads.md

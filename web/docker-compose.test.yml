services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: test
    ports:
      - "54322:5432"
    volumes:
      - ./tests/fixtures/init_local_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/alc-test
        mc anonymous set download local/alc-test
        echo "dummy-face-photo" | mc pipe local/alc-test/test-face.jpg
    restart: "no"

  api-migrate:
    image: ${API_IMAGE:-ghcr.io/ippoan/rust-alc-api:dev}
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:test@test-db:5432/postgres?options=-c search_path=alc_api
    entrypoint: ["migrate"]
    restart: "no"

  db-seed:
    image: postgres:16
    depends_on:
      api-migrate:
        condition: service_completed_successfully
    volumes:
      - ./tests/fixtures/seed.sql:/seed.sql
    entrypoint: ["sh", "-c"]
    command:
      - PGPASSWORD=test psql -h test-db -U postgres -f /seed.sql
    restart: "no"

  api:
    image: ${API_IMAGE:-ghcr.io/ippoan/rust-alc-api:dev}
    depends_on:
      db-seed:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    ports:
      - "18080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:test@test-db:5432/postgres?options=-c search_path=alc_api
      JWT_SECRET: test-jwt-secret-for-integration
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      OAUTH_STATE_SECRET: dummy-oauth-state-secret
      STORAGE_BACKEND: r2
      R2_BUCKET: alc-test
      R2_ACCOUNT_ID: test
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_ENDPOINT: http://minio:9000
      R2_PATH_STYLE: "1"
      R2_PUBLIC_URL_BASE: http://localhost:9000/alc-test
      RUST_LOG: debug
